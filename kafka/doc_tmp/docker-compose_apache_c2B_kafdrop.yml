services:
  # -----------------------------
  # Controller (KRaft)
  # -----------------------------
  controller:
    image: apache/kafka:4.2.0
    container_name: controller
    hostname: controller
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-controller-logs
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - network1

  # -----------------------------
  # Broker 1
  # -----------------------------
  broker-1:
    image: apache/kafka:4.2.0
    container_name: broker-1
    hostname: broker-1
    ports:
      - 29092:9092
    depends_on:
      - controller
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kcontroller:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-broker-logs
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - network1

  # -----------------------------
  # Broker 2
  # -----------------------------
  broker-2:
    image: apache/kafka:4.2.0
    container_name: broker-2
    hostname: broker-2
    ports:
      - 39092:9092
    depends_on:
      - controller
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:39092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /tmp/kraft-broker-logs
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - network1

  # -----------------------------
  # Kafdrop UI
  # -----------------------------
  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    depends_on:
      - controller
      - broker-1
      - broker-2
    ports:
      - "19000:9000"
    environment:
      KAFKA_BROKERCONNECT: broker-1:19092,broker-2:19092
      JVM_OPTS: "-Xms32M -Xmx64M"
    networks:
      - network1

networks:
  network1:
    name: mynetwork
    driver: bridge