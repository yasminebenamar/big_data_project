services:
  grafana:
    build: .
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_LOG_LEVEL: debug
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_DEFAULT_APP_MODE: development
    volumes:
      - ./grafana.db:/var/lib/grafana/grafana.db
    networks:
      - network1

networks:
  network1:
    name: mynetwork
    driver: bridge
