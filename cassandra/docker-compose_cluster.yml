
# Ports:
# 7199 JMX monitoring port
# 1024 - 65355 Random port required by JMX. Starting with Java 7u4 a specific port can be specified using the com.sun.management.jmxremote.rmi.port property.
# 7000 Inter-node cluster
# 7001 SSL inter-node cluster
# 9042 CQL Native Transport Port
# 9160 Thrift

services:
  cassandra1:
    image: cassandra:5.0.4
    container_name: cassandra1
    hostname: cassandra1
    networks:
      - network1
    ports:
      - "17002:7000"
      - "17003:7001"
      - "7200:7199"
      - "9043:9042"
      - "9161:9160"
    environment:
      CASSANDRA_START_RPC: true
      CASSANDRA_RPC_ADDRESS: 0.0.0.0
      CASSANDRA_LISTEN_ADDRESS: cassandra1
      CASSANDRA_BROADCAST_ADDRESS: cassandra1
      CASSANDRA_SEEDS: cassandra1, cassandra2
      CASSANDRA_CLUSTER_NAME: my-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    volumes:
      - cassandra-1:/var/lib/cassandra:rw
    restart: on-failure
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces" ]
      interval: 2m
      start_period: 2m
      timeout: 10s
      retries: 3

  cassandra2:
    image: cassandra:5.0.4
    container_name: cassandra2
    hostname: cassandra2
    networks:
      - network1
    ports:
      - "17004:7000"
      - "17005:7001"
      - "7201:7199"
      - "9044:9042"
      - "9162:9160"
    environment:
      CASSANDRA_START_RPC: true
      CASSANDRA_RPC_ADDRESS: 0.0.0.0
      CASSANDRA_LISTEN_ADDRESS: cassandra2
      CASSANDRA_BROADCAST_ADDRESS: cassandra2
      CASSANDRA_SEEDS: cassandra1, cassandra2
      CASSANDRA_CLUSTER_NAME: my-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 16
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
    depends_on:
      cassandra1:
        condition: service_healthy
    volumes:
      - cassandra-2:/var/lib/cassandra:rw
    restart: on-failure
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces" ]
      interval: 2m
      start_period: 2m
      timeout: 10s
      retries: 3

  

volumes:
  cassandra-1:
  cassandra-2:

networks:
  network1:
    name: mynetwork
    driver: bridge



